<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check In | MindCheck</title>
  <link rel="stylesheet" href="checkIn.css">
</head>
<body>
  <div class="wrap">
 
    <nav>
      <a href="checkIn.html" class="active">Check In</a>
      <a href="userWeek.html">Your Week</a>
      <a href="userNextSteps.html">Next Steps</a>
    </nav>
 
    <h1>How are you today?</h1>
    <p class="sub">Drag the slider — your emoji updates live.</p>
 
    <div class="emoji" id="mood-emoji">😐</div>
    <span class="lbl">Mood</span>
    <input type="range" min="1" max="100" value="50" id="mood-slider">
 
    <span class="lbl">What's affecting you? <span class="lbl-note">(pick all that apply)</span></span>
    <div class="pills">
      <input type="checkbox" id="t1" class="pill-cb"><label for="t1" class="pill">😴 Sleep</label>
      <input type="checkbox" id="t2" class="pill-cb"><label for="t2" class="pill">😤 Stress</label>
      <input type="checkbox" id="t3" class="pill-cb"><label for="t3" class="pill">🤝 Social</label>
      <input type="checkbox" id="t4" class="pill-cb"><label for="t4" class="pill">💼 Work</label>
      <input type="checkbox" id="t5" class="pill-cb"><label for="t5" class="pill">🏃 Body</label>
      <input type="checkbox" id="t6" class="pill-cb"><label for="t6" class="pill">🥗 Diet</label>
    </div>
 
    <button class="btn purple" onclick="logCheckIn()">Log Check-In →</button>
 
  </div>
  <script src="script.js"></script>
</body>
</html>
